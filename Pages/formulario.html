<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dados da matricula</title>
    <link rel="stylesheet" href="../estilo/formulario.css">

<style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0 auto;
            background-color: #fbfbfb;
            color: #222;
            font-size: 1rem;
        }

        .acessibilidade-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .btn-acessibilidade {
            padding: 10px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn-acessibilidade:hover {
            background-color: #003d82;
            transform: translateY(-2px);
        }

        body.fonte-dislexia,
        body.fonte-dislexia * {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive !important;
        }

        body.texto-grande,
        body.texto-grande * {
            font-size: 1.35rem !important;
        }
    </style>


</head>
<body>

    <div class="acessibilidade-container">
        <button id="botaoFonte" class="btn-acessibilidade">Ativar Fonte para Dislexia</button>
        <button id="botaoTamanho" class="btn-acessibilidade">Diminuir Texto</button>
    </div>


    <header>
        <div id="txtfoto">
            <img src="../pasta fotos/logo-removebg-preview.png" alt="foto sepema">
            <h1 id="kayo">E.E sepema</h1>
        </div>

        <nav>
    <a href="index.html">Início</a>
    <a href="sobrenos.html">Sobre Nós</a>
    <a href="matricula.html">Matrícula</a>
    <a href="contato.html">Contato</a>
    <a href="admin.html">Admin</a>
    <a href="calculadora.html">Calcule</a>
</nav>
    </header>
   
<h1>Responda os dados para fazer a matrícula</h1>

    <form onsubmit="cadastrarAluno(event)">


        <br>

        <input type="text" id="nome_a" placeholder="Nome do aluno">
        <br>

        <input type="date" id="data_a" placeholder="data do aluno">
        <br>

        <input type="number" id="telefone_a" placeholder="telefone do aluno">
        <br> 

        <input type="number" id="cpf_a" placeholder="cpf do aluno">
        <br> 

        <input type="text" id="bairro" placeholder="bairro">
        <br> 

        <input type="text" id="nome_p" placeholder="nome do responsavel">
        <br>
        
        <input type="" id="cpf_p" placeholder="cpf do responsavel">
        <br> 

        <input type="number" id="numero_p" placeholder="numero do responsavel">
        <br> 
         
        <select id="nivel">
          <option disabled selected>Selecione o ano letivo</option>
          <option>1°</option>
          <option>2°</option>
          <option>3°</option>
        </select>

        
        <button id="butaoenviar_resposta" type="submit">enviar</button>
 
    </form>

        <script>
        const botao = document.getElementById('botaoFonte');
        botao.addEventListener('click', () => {
            document.body.classList.toggle('fonte-dislexia');
            if (document.body.classList.contains('fonte-dislexia')) {
                botao.textContent = "Desativar Fonte para Dislexia";
            } else {
                botao.textContent = "Ativar Fonte para Dislexia";
            }
        });

        const botaoTamanho = document.getElementById('botaoTamanho');
        botaoTamanho.addEventListener('click', () => {
            document.body.classList.toggle('texto-grande');
            if (document.body.classList.contains('texto-grande')) {
                botaoTamanho.textContent = "Aumentar Texto";
            } else {
                botaoTamanho.textContent = "Diminuir Texto";
            }
        });
    </script>
 <script src="../java/admin.js"></script>
</body>
</html>
