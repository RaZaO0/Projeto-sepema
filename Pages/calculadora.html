<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora de Media escolar</title>
    <link rel="stylesheet" href="../estilo/calcukaylany.css">

<style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0 auto;
            background-color: #fbfbfb;
            color: #222;
            font-size: 1rem;
        }

        .acessibilidade-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .btn-acessibilidade {
            padding: 10px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn-acessibilidade:hover {
            background-color: #003d82;
            transform: translateY(-2px);
        }

        body.fonte-dislexia,
        body.fonte-dislexia * {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive !important;
        }

        body.texto-grande,
        body.texto-grande * {
            font-size: 1.35rem !important;
        }
    </style>

</head>
<body>

    <div class="acessibilidade-container">
        <button id="botaoFonte" class="btn-acessibilidade">Ativar Fonte para Dislexia</button>
        <button id="botaoTamanho" class="btn-acessibilidade">Diminuir Texto</button>
    </div>


       <header>
        <div id="txtfoto">
            <img src="../pasta fotos/logo-removebg-preview.png" alt="foto sepema">
            <h1 id="kayo">E.E sepema</h1>
        </div>



        <nav>
    <a href="index.html">Início</a>
    <a href="sobrenos.html">Sobre Nós</a>
    <a href="matricula.html">Matrícula</a>
    <a href="contato.html">Contato</a>
    <a href="admin.html">Admin</a>
    <a href="calculadora.html">Calcule</a>
</nav>


</header>




<div class="container-calculadora">
<h2>Minha Média Escolar</h2>
<input type="number" id="nota1" placeholder="Nota do 1º Bimestre" min="0" max="10" step="0.1">
<input type="number" id="nota2" placeholder="Nota do 2º Bimestre" min="0" max="10" step="0.1">
<input type="number" id="nota3" placeholder="Nota do 3º Bimestre" min="0" max="10" step="0.1">
<input type="number" id="nota4" placeholder="Nota do 4º Bimestre" min="0" max="10" step="0.1">
<button onclick="calcularMedia()">Calcular Resultado</button>

<div id="resultado"></div>
</div>
<script src="../java/calcukaylany.js"></script>

    <script>
        const botao = document.getElementById('botaoFonte');
        botao.addEventListener('click', () => {
            document.body.classList.toggle('fonte-dislexia');
            if (document.body.classList.contains('fonte-dislexia')) {
                botao.textContent = "Desativar Fonte para Dislexia";
            } else {
                botao.textContent = "Ativar Fonte para Dislexia";
            }
        });

        const botaoTamanho = document.getElementById('botaoTamanho');
        botaoTamanho.addEventListener('click', () => {
            document.body.classList.toggle('texto-grande');
            if (document.body.classList.contains('texto-grande')) {
                botaoTamanho.textContent = "Aumentar Texto";
            } else {
                botaoTamanho.textContent = "Diminuir Texto";
            }
        });
    </script>

</body>
</html>
