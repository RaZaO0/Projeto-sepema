<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  
    <button id="botaoFonte" class="btn-acessibilidade"> Ativar Fonte para Dislexia</button>
    <button id="botaoTamanho" class="btn-acessibilidade"> Aumentar Texto</button>

    <script>
      
        const botao = document.getElementById('botaoFonte');
        botao.addEventListener('click', () => {
            document.body.classList.toggle('fonte-dislexia');
            if (document.body.classList.contains('fonte-dislexia')) {
                botao.textContent = " Desativar Fonte para Dislexia";
            } else {
                botao.textContent = " Ativar Fonte para Dislexia";
            }
        });

     
        const botaoTamanho = document.getElementById('botaoTamanho');
        botaoTamanho.addEventListener('click', () => {
           
            document.body.classList.toggle('texto-grande');

            if (document.body.classList.contains('texto-grande')) {
                botaoTamanho.textContent = " Diminuir Texto";
            } else {
                botaoTamanho.textContent = " Aumentar Texto";
            }
        });
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            background-color: #fbfbfb;
            color: #222;
            font-size: 1rem; 
        }

        .btn-acessibilidade {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }

    
        body.fonte-dislexia, 
        body.fonte-dislexia * {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive !important;
        }

        body.texto-grande,
        body.texto-grande * {
            font-size: 1.35rem !important;
        }
    </style>
</body>
</html>
