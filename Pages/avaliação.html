            <script>
        const apiKey = "aa0f266602354773d284d06ef91d9976";
const lat = "-22.4132";
const lon = "-45.5251";


const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=pt_br&appid=${apiKey}`;

async function buscarClimaPiranguinho() {
    try {
        const resposta = await fetch(url);
        const dados = await resposta.json();

        if (resposta.ok) {
          
            document.getElementById("cidade").innerText = "Piranguinho - MG";
            document.getElementById("temperatura").innerText = `${Math.round(dados.main.temp)}°C`;
            document.getElementById("descricao").innerText = dados.weather[0].description;
        } else {
            console.error("Erro na API:", dados.message);
        }
    } catch (erro) {
        console.error("Erro ao conectar na API:", erro);
    }
}
buscarClimaPiranguinho();
    </script>
